<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · Grocery Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&amp;family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/groceryrun.css}">
</head>
<body class="gr-auth">
<main class="gr-auth-main">
    <div class="gr-auth-card">

        <div class="gr-auth-brand">
            <div class="gr-brand"><a th:href="@{/}">Grocery Run</a></div>
        </div>

        <h1>Create account</h1>
        <p class="gr-auth-lede">Choose a username and password to get started.</p>
        <hr class="gr-auth-divider">

        <div th:if="${param.error}" class="gr-alert gr-alert--error" role="alert">
            Could not create the account. Try a different username.
        </div>
        <div th:if="${param.success}" class="gr-alert gr-alert--success" role="status">
            Account created. You can sign in now.
        </div>

        <form th:action="@{/api/v1/users}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="gr-field">
                <label for="username">Username</label>
                <input class="gr-input" id="username" type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="gr-field">
                <label for="password">Password</label>
                <div class="gr-input-wrap">
                    <input class="gr-input" id="password" type="password" name="password" autocomplete="new-password" required>
                    <button class="gr-pw-toggle" type="button" aria-label="Show password" data-target="password">
                        <svg class="gr-pw-icon gr-pw-icon--show" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="gr-pw-icon gr-pw-icon--hide" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="gr-form-actions">
                <button class="gr-btn gr-btn--primary gr-btn--block" type="submit">Sign up</button>
            </div>
        </form>

        <div class="gr-footer-links">
            Already registered?
            <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</main>
<script>
    document.querySelectorAll('.gr-pw-toggle').forEach(btn => {
        const input = document.getElementById(btn.dataset.target);
        btn.addEventListener('click', () => {
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            btn.classList.toggle('gr-pw-toggle--visible', isHidden);
        });
    });
</script>
</body>
</html>
