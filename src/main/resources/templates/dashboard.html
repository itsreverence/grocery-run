<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Grocery Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/groceryrun.css}">
</head>
<body>
<main class="gr-page">
    <header class="gr-header">
        <div class="gr-brand"><a th:href="@{/dashboard}">Grocery Run</a></div>
        <div class="gr-header-actions">
            <span class="gr-pill">Admin</span>
            <nav class="gr-nav" aria-label="Account">
                <a th:href="@{/stores}">Stores</a>
                <form class="gr-inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="gr-btn gr-btn--link" type="submit">Sign out</button>
                </form>
            </nav>
        </div>
    </header>

    <section class="gr-hero-block">
        <p class="gr-eyebrow">Welcome back</p>
        <h1 class="gr-h1">Your workspace.</h1>
        <p class="gr-prose">
            Review stores you manage, add new locations, and keep addresses accurate in one place.
        </p>
    </section>

    <article class="gr-card gr-panel">
        <div class="gr-panel-head">
            <h2>Stores</h2>
        </div>
        <p>
            Open store management to see your list or create a new store. New locations are linked to your admin account automatically.
        </p>
        <div class="gr-actions gr-actions--compact">
            <a class="gr-btn gr-btn--primary" th:href="@{/stores}">Manage stores</a>
        </div>
    </article>
</main>
</body>
</html>
